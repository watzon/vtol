name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    name: Verify release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install V
        run: |
          git clone --depth 1 https://github.com/vlang/v /tmp/v
          make -C /tmp/v
          echo "/tmp/v" >> "$GITHUB_PATH"

      - name: Verify formatting
        run: v fmt -verify .

      - name: Run tests
        run: v test .

      - name: Ensure tag matches v.mod version
        run: |
          VERSION="$(sed -n "s/.*version: '\\([^']*\\)'.*/\\1/p" v.mod)"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"

      - name: Package release archives
        run: |
          git archive --format=tar.gz --output "vtol-${GITHUB_REF_NAME}.tar.gz" "${GITHUB_REF_NAME}"
          git archive --format=zip --output "vtol-${GITHUB_REF_NAME}.zip" "${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vtol-${{ github.ref_name }}.tar.gz
            vtol-${{ github.ref_name }}.zip
